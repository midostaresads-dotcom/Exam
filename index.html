    <meta name="theme-color" content="#FF0000">
    <style>
        :root {
            --primary-red: #FF0000;
            --green: #00FF00;
            --gold: #FFD700;
            --black: #000;
            --white: #FFF;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Cairo', sans-serif;
            background: radial-gradient(circle at center, var(--primary-red) 0%, var(--green) 30%, var(--black) 70%);
            color: var(--white);
            min-height: 100vh;
            display: grid;
            place-items: center;
            text-align: center;
            overflow-x: hidden;
            animation: pulse-bg 8s ease-in-out infinite;
            touch-action: manipulation;
        }
        @keyframes pulse-bg {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2) saturate(1.1); }
        }
        .screen {
            min-height: 100vh;
            display: grid;
            place-items: center;
            width: 100vw;
            padding: 4vw;
            position: relative;
        }
        .header {
            position: absolute;
            top: 2vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.8rem, 6vw, 3rem);
            font-weight: 900;
            text-shadow: 0 0 20px var(--gold);
            z-index: 10;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px var(--gold); }
            to { text-shadow: 0 0 30px var(--primary-red), 0 0 40px var(--gold); }
        }
        .score {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            margin: 2vh 0;
            background: linear-gradient(45deg, var(--green), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .status {
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            margin: 3vh 0;
            opacity: 0.9;
            letter-spacing: 1px;
        }
        .loader {
            width: clamp(60px, 20vw, 80px);
            height: clamp(60px, 20vw, 80px);
            border: 6px solid rgba(255,255,255,0.2);
            border-top: 6px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 4vh auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .match-btn {
            background: linear-gradient(145deg, var(--primary-red), var(--green));
            color: var(--white);
            border: none;
            border-radius: 50px;
            padding: clamp(20px, 7vw, 25px) clamp(40px, 15vw, 60px);
            font-size: clamp(1.3rem, 6vw, 1.8rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(255,0,0,0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-height: 70px;
            margin-top: 5vh;
            position: relative;
            overflow: hidden;
        }
        .match-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        .match-btn:hover::before, .match-btn:active::before {
            left: 100%;
        }
        .match-btn:active {
            transform: translateY(4px) scale(0.98);
            box-shadow: 0 10px 20px rgba(255,0,0,0.3);
        }
        .prank-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4vh;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .prank-img {
            width: clamp(280px, 90vw, 380px);
            height: auto;
            max-height: 50vh;
            object-fit: contain;
            border: 10px solid var(--gold);
            border-radius: 24px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.8),
                0 0 60px var(--primary-red),
                inset 0 4px 20px rgba(255,255,255,0.2);
            transform-style: preserve-3d;
            transition: all 0.4s ease;
        }
        .prank-img:hover {
            transform: rotateY(10deg) rotateX(5deg) scale(1.02);
        }
        .prank-title {
            font-size: clamp(2.2rem, 9vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--green), var(--gold), var(--primary-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px var(--primary-red);
            animation: shake 0.4s infinite;
            line-height: 1;
            margin-bottom: 2vh;
        }
        .laugh-text {
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            opacity: 0.95;
            animation: wiggle 0.3s infinite;
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        .study-btn {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 45px;
            padding: clamp(18px, 6vw, 22px) clamp(30px, 12vw, 45px);
            font-size: clamp(1.2rem, 5.5vw, 1.6rem);
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 18px 35px rgba(102,126,234,0.4), inset 0 2px 0 rgba(255,255,255,0.25);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 65px;
            position: relative;
        }
        .study-btn::after {
            content: '🚀';
            margin-left: 8px;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .study-btn:hover::after {
            transform: scale(1.3) rotate(10deg);
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: float-up 6s linear infinite;
        }
        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 1; }
            100% {
                transform: translateY(-20vh) scale(0);
                opacity: 0;
            }
        }
        /* Ultra Mobile First - All base optimized */
        @media (max-width: 480px) {
            .header { font-size: clamp(1.6rem, 7vw, 2.5rem); top: 1vh; }
            .match-btn, .study-btn { padding: 24px 32px; border-radius: 40px; }
            .prank-img { border-width: 8px; max-height: 42vh; }
        }
        /* Desktop enhancements */
        @media (min-width: 768px) {
            body { background-attachment: fixed; }
            .screen { padding: 5vh 8vw; }
            .prank-img { transform: perspective(1000px) rotateY(0deg); }
            .prank-img:hover { transform: perspective(1000px) rotateY(12deg) rotateX(-8deg) scale(1.05); }
        }
        /* PWA like */
        @supports (padding: max(0px)) {
            body { padding-bottom: max(env(safe-area-inset-bottom), 20px); }
        }
    </style>

<body>
    <div class="particles" id="particles"></div>
    <div class="screen loading-screen" id="loadingScreen">
        <div class="header">بث مباشر HD 4K ⚽</div>
        <div class="score">مصر 🇪🇬 0 - 0 إسبانيا 🇪🇸</div>
        <div class="status">جودة فائقة | بدون تأخير</div>
        <div class="loader"></div>
        <div class="status">جاري تحميل البث المباشر...</div>
        <button class="match-btn" onclick="startPrank()">▶️ ابدأ الماتش الآن!</button>
    </div>
    <div class="screen prank-screen" id="prankScreen">
        <img src="images/Picsart_26-03-31_22-03-46-434.jpg" alt="شربت الخدعة 😂" class="prank-img">
        <div class="prank-title">شربت الخدعة! 🤣</div>
        <div class="laugh-text">ههههههههه وضحكت عليك يا بطل! 😂😂🔥</div>
        <button class="study-btn" onclick="goStudy()">قوم ذاكر 📚</button>
    </div>

    <script>
        // Particles generator
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
            particle.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('particles').appendChild(particle);
            setTimeout(() => particle.remove(), 7000);
        }
        setInterval(createParticle, 300);

        function startPrank() {
            // Sound effect
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.2);

            // Hide loading
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('prankScreen').style.display = 'grid';
            }, 500);

            // Shake effect
            document.body.style.animation = 'shake 0.6s cubic-bezier(.36,.07,.19,.97) infinite';
            setTimeout(() => document.body.style.animation = '', 2000);

            // TTS Arabic laugh
            if ('speechSynthesis' in window) {
                const utter = new SpeechSynthesisUtterance('هههههه شربت الخدعة! ههههه وضحكت عليك يا جامد');
                utter.lang = 'ar-SA';
                utter.rate = 0.9;
                utter.pitch = 1.2;
                speechSynthesis.speak(utter);
            }

            // Vibration pattern
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);

            // Go fullscreen
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

            // Confetti burst
            for (let i = 0; i < 150; i++) {
                createParticle();
            }
        }

        function goStudy() {
            window.open('https://www.youtube.com/@khaledhelal1', '_blank');
        }

        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        console.log('🌟 خدعة الماتش الموبايل الأفضل في العالم جاهزة! 📱⚽😂');
    </script>
</body>
